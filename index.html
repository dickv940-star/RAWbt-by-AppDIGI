<style>
*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}


body{
margin:0;
background:#eef4f8;
}


/* HEADER */

header{
height:60px;
background:#1769c2;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}
  
.logo h2{
margin:0;
}

.top button{
margin-left:5px;

}

button{
cursor:pointer;
border:0;

}

.blue{
background:#1769c2;
color:#fff;
height:42px;
padding:0 18px;
border-radius:10px;
font-size:15px;
font-weight:bold;
}

.status{
background:#32b946;
padding:12px;
border-radius:30px;

}


/* LAYOUT */

.container{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px #0002;

}

h3,h2{
color:#1769c2;

}


/* CENTER */

.workspace{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:90px;

}
  
.topbar{
width:95%;
max-width:900px;
display:flex;
justify-content:space-between;
align-items:center;
margin:20px auto;
gap:20px;
}
  
.toolbar{
display:flex;
gap:10px;
background:white;
padding:10px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.tool{
width:48px;
height:48px;
padding:0;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
border-radius:10px;
background:#1769c2;
color:white;
}
  
.deleteTool{
    background:#d32f2f;
    color:#fff;
}

.deleteTool.active{
    background:#b71c1c;
    transform:scale(1.1);
}
  
.paper{
width:360px;
min-height:520px;
margin:15px auto 20px;
background:#fff;
padding:30px;
position:relative;
overflow:hidden;
border-radius:0;
box-shadow:0 8px 25px rgba(0,0,0,.18);
}

.drop{
height:230px;
border:2px dashed #1769c2;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#777;

}

.move{
  overflow:auto;
  cursor:grab;
  touch-action:none;
}
.selected{
outline:2px solid #2196f3;
outline-offset:2px;
}
  
.move:active{
  cursor:grabbing;
  
}
  
#preview{
    position:absolute;
    max-width:80%;
    top:40px;
    left:35px;
}

.text{
top:300px;
left:50px;
min-width:120px;
outline:none;
position:absolute;
}

.watermark{
position:absolute;
left:60px;
top:430px;
cursor:move;
touch-action:none;
}
  
.selected{
outline:2px solid #1976d2;
outline-offset:3px;
}
  
/* RIGHT */

.settings{
background:white;
padding:20px;

}

input,select{
width:100%;
padding:8px;

}

/* EDIT */

.editbar{
display:none;
position:fixed;
left:10px;
right:10px;
bottom:82px;
border-radius:15px;
}

/* FOOTER */

.footer{
position:fixed;
left:0;
right:0;
bottom:0;

width:100%;

display:grid;
grid-template-columns:repeat(3,1fr);

padding:10px;
gap:10px;

background:#fff;

z-index:9999;
}
  
.footer button{
height:52px;
font-weight:bold;
font-size:15px;
padding:10px 5px;
font-size:14px;
background:#1769c2;
color:#fff;
border-radius:10px;
white-space:nowrap;
}

body{
    margin:0;
    background:#eef4f8;
    padding-bottom:90px;
}

/* HEADER */

header{
    flex-wrap:wrap;
    height:auto;
    padding:10px;
}

.logo{
    display:flex;
    flex-direction:column;
}

.appname{
    font-size:22px;
    font-weight:bold;
}

.brand{
    font-size:12px;
    opacity:.8;
}

/* TOP BAR */

.topbar{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin:15px 0;
}

.topbar .blue{
    width:100%;
    height:50px;
}

.toolbar{
    width:100%;
    display:flex;
    justify-content:center;
    gap:8px;
}

/* WORKSPACE */

.container{
    display:block;
    min-height:100vh;
}

.workspace{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:auto;
    height:auto;
}

/* PAPER */

.paper{
    width:95%;
    margin-top:15px;
    margin-bottom:90px;
}

/* FOOTER */

.footer{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    overflow:visible;
}

.footer button{
    width:100%;
    font-size:14px;
}

body{
    overflow-y:auto;
    padding-bottom:90px;

</style>

<body>


<header>

<div class="logo">

<div class="appname">
RAWbt
</div>

<div class="brand">
by AppDIGI
</div>

</div>

<div class="top">

<button class="blue" onclick="installApp()">
⬇ Install
</button>

<span class="status" id="status">
Ready
</span>

</div>

</header>


<div class="container">


<div class="workspace">

<input
type="file"
id="file"
accept="image/*,.pdf"
style="display:none;">

<div class="topbar">

<button class="blue"
onclick="connectPrinter()">
🔵 Bluetooth
</button>

<div class="toolbar">

<button class="tool deleteTool" id="trashBtn" title="Hapus">
🗑
</button>
  
<button class="tool" onclick="zoom(-.1)">
−
</button>

<button class="tool" onclick="zoom(.1)">
+
</button>

<button class="tool" onclick="rotate()">
⟳
</button>

<button class="tool" onclick="fit()">
Fit
</button>

</div>

onclick="back()">
← Back
</button>

📄
<br>
Drop Image / PDF

</div>

id="preview"
class="move"
onclick="selectObject(this)">

class="text move"
contenteditable="true"
onclick="selectObject(this)">

Tulis text

</div>

class="watermark move"
onclick="selectObject(this)">

RAWbt by AppDIGI

</div>


</div>

<button onclick="cmd('italic')"><i>I</i></button>
<button onclick="cmd('underline')"><u>U</u></button>

<option value="16">16</option>
<option value="24">24</option>
<option value="32">32</option>
</select>

<option value="80">80 mm</option>
<option value="58">58 mm</option>
</select>

<input
type="range"
id="zoomRange"
min="50"
max="150"
value="100">

<input
type="range"
id="rotateRange"
min="0"
max="360">

</div>
  

<div class="footer">

<button onclick="openFile()">
📂 Upload
</button>

<button onclick="printNow()">
🖨 Print
</button>

<button onclick="editMode()">
✏ Edit Manual
</button>

</div>
  
</div> 

</div>


 <script>
   
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  
const paper = document.getElementById("paper");
const preview = document.getElementById("preview");
const drop = document.getElementById("drop");
let activeObject = null;
   
function selectObject(el){

    activeObject = el;

    if(activeObject.dataset.scale===undefined){

        activeObject.dataset.scale=1;

        activeObject.dataset.rotate=0;

    }

    document
    .querySelectorAll(".selected")
    .forEach(obj=>{
        obj.classList.remove("selected");
    });

    activeObject.classList.add("selected");

}
   
let history = [];
let currentState = {
  x: 0,
  y: 0,
  scale: 1,
  rotate: 0
};

// ambil DOM SETELAH PAGE SIAP
  console.log(" FILE INPUT LOADED");
window.addEventListener("DOMContentLoaded", () => {

    const fileInput = document.getElementById("file");
    const drop = document.getElementById("drop");
    const preview = document.getElementById("preview");

    dragElement(preview);
  
    dragElement(document.querySelector(".text"));
  
    dragElement(document.querySelector(".watermark"));
  
    if (!fileInput || !drop || !preview) {
        console.error("DOM belum siap");
        return;
    }

    fileInput.addEventListener("change", (e) => {

        const file = e.target.files[0];
        if (!file) return;

        console.log("FILE:", file.type);

        // IMAGE
       if (file.type.startsWith("image/")) {

    const reader = new FileReader();

    reader.onload = (ev) => {
        preview.src = ev.target.result;
        preview.style.display = "block";
        drop.style.display = "none";
    };

    reader.readAsDataURL(file);

} 


         

else if (file.type === "application/pdf") {

    const reader = new FileReader();

    reader.onload = function () {
        const typedarray = new Uint8Array(this.result);

        if (!window.pdfjsLib) {
            alert("PDF.js belum aktif");
            return;
        }

        pdfjsLib.getDocument(typedarray).promise.then(pdf => {
            pdf.getPage(1).then(page => {

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                const viewport = page.getViewport({ scale: 2 });

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise.then(() => {

                    preview.src = canvas.toDataURL("image/png");
                    preview.style.display = "block";
                    drop.style.display = "none";

                });

            });
        });

    };

   reader.readAsArrayBuffer(file);
}
      
    });

}); // tutup DOMContentLoaded
   
function zoom(v){

    if(!activeObject) return;

    let s=parseFloat(activeObject.dataset.scale);

    s+=v;

    if(s<0.2) s=0.2;

    activeObject.dataset.scale=s;

    applyTransform();

}

function rotate(){

    if(!activeObject) return;

    let r=parseFloat(activeObject.dataset.rotate);

    r+=90;

    activeObject.dataset.rotate=r;

    applyTransform();

}

function fit(){

    if(!activeObject){
        alert("Pilih objek terlebih dahulu");
        return;
    }

    const paperRect = paper.getBoundingClientRect();

    const margin = 10;

    activeObject.style.left = margin + "px";
    activeObject.style.top = margin + "px";

    if(activeObject.tagName==="IMG"){

        activeObject.style.width =
        (paperRect.width-margin*2)+"px";

        activeObject.style.height="auto";

    }

    currentState.x=0;
    currentState.y=0;
    currentState.scale=1;
    currentState.rotate=0;

    applyTransform();

}
   
const zoomRange = document.getElementById("zoomRange");
const rotateRange = document.getElementById("rotateRange");

if (zoomRange) {
    zoomRange.oninput = function () {
  currentState.scale = this.value / 100;
  applyTransform();
};
  
}

if (rotateRange) {
   rotateRange.oninput = function () {
  currentState.rotate = this.value;
  applyTransform();
};
  
}
  
async function printNow(){

    console.log("===== PRINT =====");
    console.log("printerDevice =", printerDevice);
    console.log("printerServer =", printerServer);
    console.log("printerService =", printerService);
    console.log("printerWrite =", printerWrite);

    if(!printerWrite){

        alert("Connect Bluetooth dulu");

        return;

    }

    await sendPrinter(initESC());

    const img = await imageToESC();

    if(img instanceof Uint8Array){

        await sendPrinter(img);

    }

    await sendPrinter(cutPaper());

}
function saveState() {
    history.push({
        x: currentState.x,
        y: currentState.y,
        scale: currentState.scale,
        rotate: currentState.rotate
    });
}
 function openFile(){
    const input = document.getElementById("file");
    input.value = "";
    input.click(); // TANPA setTimeout
}
  
// EDIT


function editMode(){


let e=
document.getElementById("editbar");


e.style.display=
e.style.display=="block"
?"none":"block";


}

function addText(){

    let t = document.createElement("div");

    t.className = "text move";

    t.contentEditable = true;

    t.innerHTML = "Text Baru";

    t.style.left = "40px";
    t.style.top = "120px";

    paper.appendChild(t);

    dragElement(t);

    selectObject(t);

}

function cmd(c){
  
document.execCommand(c);

}

function dragElement(el){

    let startX=0;
    let startY=0;

    let dragging=false;

    el.style.position="absolute";

    el.addEventListener("pointerdown",(e)=>{

        selectObject(el);

        dragging=true;

        startX=e.clientX-el.offsetLeft;
        startY=e.clientY-el.offsetTop;

        el.setPointerCapture(e.pointerId);

        e.stopPropagation();

    });

    el.addEventListener("pointermove",(e)=>{

        if(!dragging) return;

        el.style.left=(e.clientX-startX)+"px";
        el.style.top=(e.clientY-startY)+"px";

    });

    el.addEventListener("pointerup",()=>{

        dragging=false;

    });

    el.addEventListener("pointercancel",()=>{

        dragging=false;

    });

}

function fontSize(v){

document.execCommand(
"fontSize",
false,
7
);


}ok 

function applyTransform(){

    if(!activeObject) return;

    const scale=activeObject.dataset.scale||1;

    const rotate=activeObject.dataset.rotate||0;

    activeObject.style.transform=

    `scale(${scale})
     rotate(${rotate}deg)`;

}
  
function back() {
  if (history.length === 0) return;

  const prev = history.pop();

  currentState.x = prev.x;
  currentState.y = prev.y;
  currentState.scale = prev.scale;
  currentState.rotate = prev.rotate;

  applyTransform();
} 
 const trashBtn = document.getElementById("trashBtn");

trashBtn.addEventListener("click", () => {

    if (!activeObject) {
        alert("Pilih objek terlebih dahulu.");
        return;
    }

    // Jangan hapus area paper
    if (activeObject.id === "paper") return;

    activeObject.remove();

    activeObject = null;

});
   
// INSTALL APP


let deferred;



window.addEventListener(
"beforeinstallprompt",
e=>{

e.preventDefault();

deferred=e;


});


function installApp(){
if(deferred)
deferred.prompt();
else
alert(
"Gunakan Chrome Android untuk install"
);


}

</script>
