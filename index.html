<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
<title>RAWbt AppDIGI</title>

<link rel="manifest" href="manifest.json">



<style>
*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}


body{
margin:0;
background:#eef4f8;
}


/* HEADER */

header{
height:60px;
background:#1769c2;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}
  
.logo h2{
margin:0;
}

.top button{
margin-left:5px;

}

button{
cursor:pointer;
border:0;

}

.blue{
background:#1769c2;
color:#fff;
height:42px;
padding:0 18px;
border-radius:10px;
font-size:15px;
font-weight:bold;
}

.status{
background:#32b946;
padding:12px;
border-radius:30px;

}


/* LAYOUT */

.container{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px #0002;

}

h3,h2{
color:#1769c2;

}


/* CENTER */

.workspace{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:90px;

}
  
.topbar{
width:95%;
max-width:900px;
display:flex;
justify-content:space-between;
align-items:center;
margin:20px auto;
gap:20px;
}
  
.toolbar{
display:flex;
gap:10px;
background:white;
padding:10px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.tool{
width:48px;
height:48px;
padding:0;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
border-radius:10px;
background:#1769c2;
color:white;
}
  
.deleteTool{
    background:#d32f2f;
    color:#fff;
}

.deleteTool.active{
    background:#b71c1c;
    transform:scale(1.1);
}
  
.paper{
width:360px;
min-height:520px;
margin:15px auto 20px;
background:#fff;
padding:30px;
position:relative;
overflow:hidden;
border-radius:0;
box-shadow:0 8px 25px rgba(0,0,0,.18);
}

.drop{
height:230px;
border:2px dashed #1769c2;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#777;

}

.move{
position:absolute;
cursor:move;
user-select:none;

}

#preview{
max-width:80%;
top:40px;
left:35px;

}

.text{
top:300px;
left:50px;
min-width:120px;
outline:none;

}

.watermark{
position:absolute;
bottom:20px;
left:0;
right:0;
text-align:center;
padding-top:15px;
border-top:1px dashed #ccc;
color:#888;

}

/* RIGHT */

.settings{
background:white;
padding:20px;

}

input,select{
width:100%;
padding:8px;

}

/* EDIT */

.editbar{
display:none;
position:fixed;
left:10px;
right:10px;
bottom:82px;
border-radius:15px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
display:grid;
grid-template-columns:repeat(3,1fr);
align-items:center;
height:72px;
background:#fff;
padding:10px;
gap:10px;
box-shadow:0 -3px 10px #0002;
z-index:9999;
}
  
.footer button{
height:52px;
font-weight:bold;
font-size:15px;
padding:10px 5px;
font-size:14px;
background:#1769c2;
color:#fff;
border-radius:10px;
white-space:nowrap;
}

body{
    margin:0;
    background:#eef4f8;
    padding-bottom:90px;
}
/* MOBILE */


@media (max-width:850px){

/* HEADER */

header{
    flex-wrap:wrap;
    height:auto;
    padding:10px;
}

.logo{
    display:flex;
    flex-direction:column;
}

.appname{
    font-size:22px;
    font-weight:bold;
}

.brand{
    font-size:12px;
    opacity:.8;
}

/* TOP BAR */

.topbar{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin:15px 0;
}

.topbar .blue{
    width:100%;
    height:50px;
}

.toolbar{
    width:100%;
    display:flex;
    justify-content:center;
    gap:8px;
}

/* WORKSPACE */

.container{
    display:block;
    min-height:100vh;
}

.workspace{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:auto;
    height:auto;
}

/* PAPER */

.paper{
    width:95%;
    margin-top:15px;
    margin-bottom:90px;
}

/* FOOTER */

.footer{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    overflow:visible;
}

.footer button{
    width:100%;
    font-size:14px;
}

body{
    overflow-y:auto;
    padding-bottom:90px;
}

}

</style>
  
</head>

<body>


<header>

<div class="logo">

<div class="appname">
RAWbt
</div>

<div class="brand">
by AppDIGI
</div>

</div>

<div class="top">

<button class="blue" onclick="installApp()">
⬇ Install
</button>

<span class="status" id="status">
Ready
</span>

</div>

</header>


<div class="container">


<div class="workspace">

<input
type="file"
id="file"
accept="image/*,.pdf"
style="display:none;">

<div class="topbar">

<button class="blue"
onclick="connectPrinter()">
🔵 Bluetooth
</button>

<div class="toolbar">

<button class="tool deleteTool" id="trashBtn" title="Hapus">
🗑
</button>
  
<button class="tool" onclick="zoom(-.1)">
−
</button>

<button class="tool" onclick="zoom(.1)">
+
</button>

<button class="tool" onclick="rotate()">
⟳
</button>

<button class="tool" onclick="fit()">
Fit
</button>

</div>

<button class="blue"
onclick="back()">
← Back
</button>

</div>

<div class="paper" id="paper">



<div class="drop" id="drop">

📄
<br>
Drop Image / PDF

</div>


<img id="preview" class="move">


<div class="text move" contenteditable="true">

Tulis text

</div>


<div class="watermark">

RAWbt by AppDIGI

</div>


</div>


<div class="editbar" id="editbar">

<button onclick="addText()">➕</button>
<button onclick="cmd('bold')"><b>B</b></button>
<button onclick="cmd('italic')"><i>I</i></button>
<button onclick="cmd('underline')"><u>U</u></button>

<select onchange="fontSize(this.value)">
<option value="16">16</option>
<option value="24">24</option>
<option value="32">32</option>
</select>

<select id="paperSize">
<option value="80">80 mm</option>
<option value="58">58 mm</option>
</select>

<input
type="range"
id="zoomRange"
min="50"
max="150"
value="100">

<input
type="range"
id="rotateRange"
min="0"
max="360">

</div>
  

<div class="footer">

<button onclick="openFile()">
📂 Upload
</button>

<button onclick="printNow()">
🖨 Print
</button>

<button onclick="editMode()">
✏ Edit Manual
</button>

</div>
  
</div> 

</div>

<script>
  
let history = [];
let currentState = {
  x: 0,
  y: 0,
  scale: 1,
  rotate: 0
};  
  
console.log("SCRIPT INDEX MULAI");
window.onerror = function(msg, url, line){
    console.error("ERROR :", msg, "baris", line);
};
  
const drop = document.getElementById("drop");
const paper = document.getElementById("paper");

let preview =
document.getElementById("preview");


const fileInput = document.getElementById("file");
const trashBtn = document.getElementById("trashBtn");
  
fileInput.addEventListener("change", function(e){

let file = e.target.files[0];

if(!file) return;



// GAMBAR JPG PNG

if(file.type.startsWith("image/")){


let reader = new FileReader();


reader.onload=function(ev){

preview.src = ev.target.result;

preview.style.display="block";

drop.style.display="none";

dragElement(preview);

};


reader.readAsDataURL(file);


}


// PDF

else if(file.type==="application/pdf"){


let reader=new FileReader();


reader.onload=function(){


let typedarray =
new Uint8Array(this.result);



if(typeof pdfjsLib==="undefined"){

alert("PDF engine belum aktif");

return;

}


pdfjsLib.getDocument(
typedarray
).promise.then(function(pdf){



pdf.getPage(1).then(function(page){


let canvas =
document.createElement("canvas");


let ctx =
canvas.getContext("2d");



let viewport =
page.getViewport({
scale:2
});



canvas.width =
viewport.width;


canvas.height =
viewport.height;



page.render({

canvasContext:ctx,

viewport:viewport


}).promise.then(function(){


preview.src =
canvas.toDataURL("image/png");



preview.style.display="block";


drop.style.display="none";


dragElement(preview);



});


});


});


}


reader.readAsArrayBuffer(file);


}


else{


alert("Format tidak didukung");


}


});
function zoom(v){
  saveState();

  currentState.scale += v;

  applyTransform();
}

function rotate(){
  saveState();

  currentState.rotate += 90;

  applyTransform();
}



function fit() {
  saveState();

  currentState.x = 0;
  currentState.y = 0;
  currentState.scale = 1;
  currentState.rotate = 0;

  applyTransform();
}
  
const zoomRange = document.getElementById("zoomRange");
const rotateRange = document.getElementById("rotateRange");

if (zoomRange) {
    zoomRange.oninput = function () {
  currentState.scale = this.value / 100;
  applyTransform();
};
  
}

if (rotateRange) {
   rotateRange.oninput = function () {
  currentState.rotate = this.value;
  applyTransform();
};
  
}
  
async function printNow(){

    console.log("===== PRINT =====");
    console.log("printerDevice =", printerDevice);
    console.log("printerServer =", printerServer);
    console.log("printerService =", printerService);
    console.log("printerWrite =", printerWrite);

    if(!printerWrite){

        alert("Connect Bluetooth dulu");

        return;

    }

    await sendPrinter(initESC());

    const img = imageToESC();

    if(img instanceof Uint8Array){

        await sendPrinter(img);

    }

    await sendPrinter(cutPaper());

}

  function openFile(){
    const input = document.getElementById("file");
    input.value = "";
    input.click();
}
  
// EDIT


function editMode(){


let e=
document.getElementById("editbar");


e.style.display=
e.style.display=="block"
?"none":"block";


}

function addText(){


let t =
document.createElement("div");
t.className="text move";
t.contentEditable=true;
t.innerHTML="Text Baru";
paper.appendChild(t);
dragElement(t);


}



function cmd(c){

document.execCommand(c);

}



function fontSize(v){

document.execCommand(
"fontSize",
false,
7
);


}



// DRAG


function dragElement(el) {
  let offsetX, offsetY;

  el.onmousedown = function (e) {

    saveState();

    offsetX = e.clientX - currentState.x;
    offsetY = e.clientY - currentState.y;

    document.onmousemove = function (e) {

      currentState.x = e.clientX - offsetX;
      currentState.y = e.clientY - offsetY;

      applyTransform();
    };

    document.onmouseup = function () {
      document.onmousemove = null;
    };
  };
}


document.querySelectorAll(".move")
.forEach(x=>dragElement(x));



function saveState() {
  history.push({
    x: currentState.x,
    y: currentState.y,
    scale: currentState.scale,
    rotate: currentState.rotate
  });

  // opsional: batasi memory
  if (history.length > 50) {
    history.shift();
  }
}

function applyTransform() {
  preview.style.transform =
    `translate(${currentState.x}px, ${currentState.y}px)
     scale(${currentState.scale})
     rotate(${currentState.rotate}deg)`;
}
  
function back() {
  if (history.length === 0) return;

  currentState = history.pop();
  applyTransform();
}  
  
// INSTALL APP


let deferred;



window.addEventListener(
"beforeinstallprompt",
e=>{

e.preventDefault();

deferred=e;


});


function installApp(){


if(deferred)

deferred.prompt();


else

alert(
"Gunakan Chrome Android untuk install"
);


}

</script>

</script>


</body>
