<style>

body{

}


/* HEADER */

header{
height:60px;
background:#1769c2;
color:white;
display:flex;
justify-content:space-between;

.top button{

button{

/* LAYOUT */

align-items:center;
padding:20px;

margin-bottom:15px;

}

h3,h2{

}


/* CENTER */

.workspace{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:90px;

}
  
.topbar{
width:95%;
max-width:900px;
display:flex;
justify-content:space-between;
align-items:center;
margin:20px auto;
gap:20px;
}
  
.toolbar{
display:flex;
gap:10px;
background:white;
padding:10px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.tool{
width:48px;
height:48px;
padding:0;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
border-radius:10px;
background:#1769c2;
color:white;
}

    background:#d32f2f;
    color:#fff;
}

.deleteTool.active{
    background:#b71c1c;
    transform:scale(1.1);
}
  
.paper{
width:360px;
min-height:520px;
margin:15px auto 20px;
background:#fff;
padding:30px;
position:relative;
overflow:hidden;
border-radius:0;
box-shadow:0 8px 25px rgba(0,0,0,.18);
}

.drop{
height:230px;
border:2px dashed #1769c2;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#777;

}

.move{
  overflow:auto;
  cursor:grab;
  touch-action:none;
}

.move:active{
  cursor:grabbing;
  
}
  
#preview{
    position:absolute;
    max-width:80%;
    top:40px;
    left:35px;
}

.text{
top:300px;
left:50px;
min-width:120px;
outline:none;
position:absolute;
}

.watermark{
position:absolute;
bottom:20px;
left:0;
right:0;
text-align:center;
padding-top:15px;
border-top:1px dashed #ccc;
color:#888;

}

/* RIGHT */

.settings{
background:white;
padding:20px;

}

input,select{
width:100%;
padding:8px;

}

/* EDIT */

.editbar{
display:none;
position:fixed;
left:10px;
right:10px;
bottom:82px;
border-radius:15px;
}

/* FOOTER */

.footer{
position:fixed;
left:0;
right:0;
bottom:0;

width:100%;

display:grid;
grid-template-columns:repeat(3,1fr);

padding:10px;
gap:10px;

background:#fff;

z-index:9999;
}
  
.footer button{
height:52px;
font-weight:bold;
font-size:15px;
padding:10px 5px;
font-size:14px;
background:#1769c2;

border-radius:10px;
white-space:nowrap;

body{
    margin:0;
    background:#eef4f8;
    padding-bottom:90px;

<script>
  
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  
const paper = document.getElementById("paper");
const preview = document.getElementById("preview");
const drop = document.getElementById("drop");
  
let history = [];
let currentState = {
  x: 0,
  y: 0,
  scale: 1,
  rotate: 0
};

// ambil DOM SETELAH PAGE SIAP
  console.log("SCRIPT FILE INPUT LOADED");
window.addEventListener("DOMContentLoaded", () => {

    const fileInput = document.getElementById("file");
    const drop = document.getElementById("drop");
    const preview = document.getElementById("preview");

    if (!fileInput || !drop || !preview) {
        console.error("DOM belum siap");
        return;
    }

    fileInput.addEventListener("change", (e) => {

        const file = e.target.files[0];
        if (!file) return;

        console.log("FILE:", file.type);

        // IMAGE
       if (file.type.startsWith("image/")) {

    const reader = new FileReader();

    reader.onload = (ev) => {
        preview.src = ev.target.result;
        preview.style.display = "block";
        drop.style.display = "none";
    };

    reader.readAsDataURL(file);

} 


         

else if (file.type === "application/pdf") {

    const reader = new FileReader();

    reader.onload = function () {
        const typedarray = new Uint8Array(this.result);

        if (!window.pdfjsLib) {
            alert("PDF.js belum aktif");
            return;
        }

        pdfjsLib.getDocument(typedarray).promise.then(pdf => {
            pdf.getPage(1).then(page => {

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                const viewport = page.getViewport({ scale: 2 });

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise.then(() => {

                    preview.src = canvas.toDataURL("image/png");
                    preview.style.display = "block";
                    drop.style.display = "none";

                });

            });
        });

    };

    reader.readAsArrayBuffer(file);
});

function zoom(v){
  saveState();

  currentState.scale = Math.max(0.1, currentState.scale + v);
  applyTransform();
}

function rotate(){
  saveState();

  currentState.rotate += 90;
  applyTransform();
}

function fit(){
  saveState();

  currentState.x = 0;
  currentState.y = 0;
  currentState.scale = 1;
  currentState.rotate = 0;

  applyTransform();
}
  
const zoomRange = document.getElementById("zoomRange");
const rotateRange = document.getElementById("rotateRange");

if (zoomRange) {
    zoomRange.oninput = function () {
  currentState.scale = this.value / 100;
  applyTransform();
};
  
}

if (rotateRange) {
   rotateRange.oninput = function () {
  currentState.rotate = this.value;
  applyTransform();
};
  
}
  
async function printNow(){

    console.log("===== PRINT =====");
    console.log("printerDevice =", printerDevice);
    console.log("printerServer =", printerServer);
    console.log("printerService =", printerService);
    console.log("printerWrite =", printerWrite);

    if(!printerWrite){

        alert("Connect Bluetooth dulu");

        return;

    }

    await sendPrinter(initESC());

    const img = imageToESC();

    if(img instanceof Uint8Array){

        await sendPrinter(img);

    }

    await sendPrinter(cutPaper());

}

 function openFile(){
    const input = document.getElementById("file");
    input.value = "";
    input.click(); // TANPA setTimeout
}
  
// EDIT


function editMode(){


let e=
document.getElementById("editbar");


e.style.display=
e.style.display=="block"
?"none":"block";


}

function addText(){


let t =
document.createElement("div");
t.className="text move";
t.contentEditable=true;
t.innerHTML="Text Baru";
paper.appendChild(t);
dragElement(t);


}

function cmd(c){

document.execCommand(c);

}

function dragElement(el) {
    let offsetX = 0, offsetY = 0, isDown = false;

    el.addEventListener("pointerdown", (e) => {
        isDown = true;
        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;
    });

    window.addEventListener("pointermove", (e) => {
        if (!isDown) return;

        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    });

    window.addEventListener("pointerup", () => {
        isDown = false;
    });
}
      

function fontSize(v){

document.execCommand(
"fontSize",
false,
7
);


}


// DRAG

let drag = false;
let startX = 0;
let startY = 0;

paper.addEventListener("pointerdown", (e)=>{
  
    saveState();
  
    drag = true;

    startX = e.clientX - currentState.x;
    startY = e.clientY - currentState.y;

    paper.setPointerCapture(e.pointerId);
});

paper.addEventListener("pointermove", (e)=>{
    if(!drag) return;

    currentState.x = e.clientX - startX;
    currentState.y = e.clientY - startY;

    applyTransform()
});

paper.addEventListener("pointerup", ()=>{
    drag = false;
});

paper.addEventListener("pointercancel", ()=>{
    drag = false;
});

function applyTransform() {
    paper.style.transform =
        `translate(${currentState.x}px, ${currentState.y}px)
         scale(${currentState.scale})
         rotate(${currentState.rotate}deg)`;
}
  
function back() {
  if (history.length === 0) return;

  const prev = history.pop();

  currentState.x = prev.x;
  currentState.y = prev.y;
  currentState.scale = prev.scale;
  currentState.rotate = prev.rotate;

  applyTransform();
} 
  
// INSTALL APP


let deferred;



window.addEventListener(
"beforeinstallprompt",
e=>{

e.preventDefault();

deferred=e;


});


function installApp(){
if(deferred)
deferred.prompt();
else
alert(
"Gunakan Chrome Android untuk install"
);


}

</script>
